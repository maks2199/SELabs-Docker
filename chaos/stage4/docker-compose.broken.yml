name: chaos-stage4

networks:
  orders-net:
    driver: bridge

services:
  orders-api:
    image: docker-lab/orders-api:latest
    container_name: backend-orders-api
    build:
      context: ../../steps/step_4_network/description/backend
    env_file: ".env"
    networks:
      - orders-net

  orders-web:
    image: orders-frontend
    container_name: frontend-orders
    build:
      context: ../../steps/step_4_network/description/frontend
    ports:
      - "3001:3000"
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8080"
    networks:
      - orders-net
