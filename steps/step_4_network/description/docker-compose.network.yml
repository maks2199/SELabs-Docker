name: step_4_network

networks:
  orders-net:
    name: orders-net
    driver: bridge

services:
  orders-api:
    image: docker-lab/orders-api:latest
    container_name: backend-orders-api
    build:
      context: backend
    env_file: ".env"
    networks:
      - orders-net

  orders-web:
    image: orders-frontend
    container_name: frontend-orders
    build:
      context: frontend
    ports:
      - "3001:3000"
    environment:
      BACKEND_HOST: orders-api
    networks:
      - orders-net
