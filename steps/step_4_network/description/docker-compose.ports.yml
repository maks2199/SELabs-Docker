name: step_4_network

services:
  orders-api:
    image: docker-lab/orders-api:latest
    container_name: backend-orders-api
    build:
      context: backend
    ports:
      - "8081:8080"
    env_file: ".env"

  orders-web:
    image: orders-frontend
    container_name: frontend-orders
    build:
      context: frontend
    ports:
      - "3001:3000"
    environment:
      BACKEND_HOST: host.docker.internal # IP адрес вышей ВМ: 192.168.2.100
      BACKEND_PORT: "8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
